<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HexaSurvey — Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="surv-land.css">
<style>
    *{ box-sizing: border-box; }
    body{ margin-top: 80px; padding: 30px; }
    .analytics-wrap{ max-width: 820px; margin: 40px auto; }
    .inner-card{
        background-color: var(--bg-elevated);
        padding: 26px;
        border-radius: 18px;
        margin-top: 24px;
        border: 0.5px solid var(--border);
    }
    .summary-row{ display:flex; gap: 16px; }
    .summary-card{
        flex: 1;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 20px;
        text-align: center;
    }
    .summary-card .num{
        font-family: var(--font-mono); font-size: 1.8rem; font-weight: 600; color: var(--purple-300);
    }
    .summary-card .label{ color: var(--muted-dim); font-size: 0.85rem; margin-top: 6px; }

    .question-block{
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 22px;
        margin-bottom: 18px;
    }
    .question-block h3{
        font-family: var(--font-display); font-size: 1.05rem; font-weight: 600; margin-bottom: 16px;
    }
    .bar-row{ margin-bottom: 12px; }
    .bar-row .bar-labels{
        display: flex; justify-content: space-between; font-size: 0.88rem; color: var(--muted); margin-bottom: 6px;
    }
    .bar-track{
        width: 100%; height: 10px; background: var(--bg-elevated); border-radius: 999px; overflow: hidden;
    }
    .bar-fill{
        height: 100%; border-radius: 999px;
        background: linear-gradient(90deg, var(--purple-300), var(--purple-500));
        transition: width 0.6s var(--ease-out);
    }
    .no-answers{ color: var(--muted-dim); font-size: 0.9rem; }
    .state-msg{ color: var(--muted); text-align: center; padding: 40px 0; }
    .back-link{ color: var(--muted); font-size: 0.9rem; }
    .back-link:hover{ color: var(--white); }
</style>
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <div class="logo">Hexa<span class="x">Survey</span></div>
    <a href="dashboard.html" class="sign-in nav-cta">Dashboard</a>
  </div>
</header>

<div class="analytics-wrap">
    <a href="dashboard.html" class="back-link">&larr; Back to dashboard</a>

    <div id="loadingState" class="state-msg">Loading analytics…</div>

    <div id="analyticsContent" style="display:none;">
        <h1 id="surveyTitle" class="headline" style="font-size: 2rem; margin-top: 16px;"></h1>

        <div class="summary-row" style="margin-top: 20px;">
            <div class="summary-card">
                <div class="num" id="totalResponses">0</div>
                <div class="label">Total responses</div>
            </div>
        </div>

        <div id="questionsContainer" style="margin-top: 30px;"></div>
    </div>
</div>

<script>
    const API_BASE = 'http://127.0.0.1:5000/api';
    const params = new URLSearchParams(window.location.search);
    const surveyId = params.get('id');

    const loadingState = document.getElementById('loadingState');
    const analyticsContent = document.getElementById('analyticsContent');
    const surveyTitleEl = document.getElementById('surveyTitle');
    const totalResponsesEl = document.getElementById('totalResponses');
    const questionsContainer = document.getElementById('questionsContainer');

    function escapeHtml(str){
        const div = document.createElement('div');
        div.textContent = str == null ? '' : String(str);
        return div.innerHTML;
    }

    function showState(msg){
        loadingState.textContent = msg;
        loadingState.style.display = 'block';
        analyticsContent.style.display = 'none';
    }

    function renderQuestionBlock(q){
        const block = document.createElement('div');
        block.className = 'question-block';

        let barsHtml = '';
        if (q.results && q.results.length){
            barsHtml = q.results.map(r => `
                <div class="bar-row">
                    <div class="bar-labels">
                        <span>${escapeHtml(r.option)}</span>
                        <span>${r.count} &middot; ${r.percentage}%</span>
                    </div>
                    <div class="bar-track">
                        <div class="bar-fill" style="width:${r.percentage}%;"></div>
                    </div>
                </div>
            `).join('');
        } else {
            barsHtml = '<p class="no-answers">No responses yet for this question.</p>';
        }

        block.innerHTML = `
            <h3>${escapeHtml(q.question)}</h3>
            ${barsHtml}
        `;

        questionsContainer.appendChild(block);
    }

    async function loadAnalytics(){
        if (!surveyId){
            showState('No survey specified.');
            return;
        }

        try {
            const response = await fetch(`${API_BASE}/surveys/${surveyId}/analytics`, {
                method: 'GET',
                credentials: 'include'
            });

            if (response.status === 401){
                window.location.href = 'auth.html';
                return;
            }
            if (response.status === 403){
                showState('You can only view analytics for surveys you own.');
                return;
            }
            if (response.status === 404){
                showState('Survey not found.');
                return;
            }

            const data = await response.json();

            if (!response.ok || (data.success === false)){
                showState(data.message || 'Could not load analytics.');
                return;
            }

            const payload = data.data ? data.data : data;

            surveyTitleEl.textContent = payload.title || `Survey #${surveyId}`;
            totalResponsesEl.textContent = payload.total_responses ?? 0;
            (payload.questions || []).forEach(renderQuestionBlock);

            loadingState.style.display = 'none';
            analyticsContent.style.display = 'block';

        } catch (err){
            console.error('Failed to load analytics:', err);
            showState('Could not reach the server. Is the Flask backend running on http://127.0.0.1:5000?');
        }
    }

    loadAnalytics();
</script>

</body>
</html>
