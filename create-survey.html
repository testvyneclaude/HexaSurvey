<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="surv-land.css">
    <title>Document</title>
    <style>
        *{
            box-sizing: border-box;
            margin-top:10px;
            padding: 0px;
        }
        nav{
            margin-left: 10px;
            color: var(--purple-300);
        }
        .create{
            background-color: var(--bg-elevated);
            padding: 20px;
            border-radius: 18px;
            margin-top: 40px;
            border: 0.5px solid var(--border);
            
        }
        .create label{
            font-size: 22px;
        }
        .create input{
            background-color: transparent;
            padding: 17px;
            border: none;
            border-top: 0.5px solid var(--border);
            border-bottom: 0.5px solid var(--muted);
            border-radius: 12px;
            width: 100%;
            color: white;
        }
        .create button{
            border: none;
            padding: 12px;
            border-radius: 10px;
        }
        .question-box input {
         background-color: transparent;
         padding: 17px; /* Forces the dynamic inputs to have height */
         border: none;
         border-top: 0.5px solid var(--border);
         border-bottom: 0.5px solid var(--muted);
         border-radius: 12px;
         width: 100%;
         color: white;
         font-size: 16px;
        }
        .question-box label {
            font-size: 18px;
            color: var(--text);
        }

        .mcq-options input[type="radio"] {
         width: auto !important;
         display: inline-block;
         margin-right: 10px;
        }
    </style>
</head>
<body>
    <nav><p><a href="dashboard.html">Back to Dashboard</a></p></nav>

    <h2 class="headline" style="text-align: center; margin-top: 20px;">Create Your Survey in Minutes</h2>

    <section class="create">
        <label>Survey Title</label><br>
        <input type="text" placeholder="e.g Customer Satisfaction Survey"><br><br>
        <label>Description (optional)</label><br>
        <input type="text" placeholder="What is this survey about?">

        <h3>Questions</h3><br>
        <div id="questionsContainer"></div>
        <button onclick="addQuestion('text')">+ Add Text Question</button>
        <button onclick="addQuestion('mcq')">+ Add Multiple Choice Question</button>
        
        <button onclick="submitSurvey()" style="background-color: var(--purple-700); color: white; margin-top: 30px; padding: 15px 30px; font-size: 18px; width: 100%; cursor: pointer;">
    Submit & Create Survey
</button>
    </section>


    <script>
       
let questionCounter = 0;

function addQuestion(type) {
    questionCounter++;
    const qId = "question_" + questionCounter;

    const div = document.createElement("div");
    div.className = "question-box";
    div.id = qId;

    let inputHtml = "";

    if (type === 'text') {
        inputHtml = `
            <input type="text" placeholder="Enter your short answer question here"><br><br>
        `;
    } 
    else if (type === 'mcq') {
               inputHtml = `
            <input type="text" placeholder="Enter your MCQ question here" style="margin-bottom: 15px;"><br>
            
            <div id="options-container-${qId}" class="mcq-options" style="margin-left: 20px;">
                <div style="margin-top: 5px;">
                    <input type="radio" name="radio_${qId}" disabled> 
                    <input type="text" placeholder="Option 1" style="width: 75%; display: inline-block; padding: 8px;">
                </div>
                <div style="margin-top: 5px;">
                    <input type="radio" name="radio_${qId}" disabled> 
                    <input type="text" placeholder="Option 2" style="width: 75%; display: inline-block; padding: 8px;">
                </div>
            </div>
            
            <button type="button" onclick="addOption('${qId}')" style="margin: 10px 0 20px 20px; background-color: #555; color: white; padding: 6px 12px; font-size: 14px;">+ Add Option</button>
            <br>
        `;
    }

    div.innerHTML = `
        <label>Question ${questionCounter} (${type.toUpperCase()})</label><br>
        ${inputHtml}
        <button onclick="removeQuestion('${qId}')">Remove Question</button>
        <hr style="margin:20px 0;">
    `;

    document.getElementById("questionsContainer").appendChild(div);
}

 
function addOption(questionId) {
    const container = document.getElementById(`options-container-${questionId}`);
    

    const currentOptionsCount = container.children.length + 1;
    
    const optionDiv = document.createElement("div");
    optionDiv.style.marginTop = "5px";
    optionDiv.innerHTML = `
        <input type="radio" name="radio_${questionId}" disabled> 
        <input type="text" placeholder="Option ${currentOptionsCount}" style="width: 75%; display: inline-block; padding: 8px;">
        <button type="button" onclick="this.parentElement.remove()" style="background: transparent; color: red; border: none; cursor: pointer; margin-left: 5px;">✕</button>
    `;
    
    container.appendChild(optionDiv);
}

function removeQuestion(elementId) {
    const element = document.getElementById(elementId);
    if (element) {
        element.remove();
    }
}

    function submitSurvey() {
   
    const surveyTitle = document.querySelector('.create input[placeholder*="Customer Satisfaction"]').value;
    const surveyDescription = document.querySelector('.create input[placeholder*="What is this survey about?"]').value;

    if (!surveyTitle.trim()) {
        alert("Please enter a survey title!");
        return;
    }

    const questionsData = [];
    const questionElements = document.querySelectorAll('.question-box');

    questionElements.forEach((box) => {
        const qId = box.id;
        const labelText = box.querySelector('label').innerText;
        const isMcq = labelText.includes('(MCQ)');
        const type = isMcq ? 'mcq' : 'text';

        const questionTextInput = box.querySelector('input[type="text"]');
        const questionText = questionTextInput ? questionTextInput.value : "";

        const questionItem = {
            type: type,
            question_text: questionText
        };

        
        if (isMcq) {
            const options = [];
            const optionInputs = box.querySelectorAll(`#options-container-${qId} input[type="text"]`);
            
            optionInputs.forEach(optInput => {
                if (optInput.value.trim() !== "") {
                    options.push(optInput.value);
                }
            });
            
            questionItem.options = options;
        }

        questionsData.push(questionItem);
    });

  
    const fullSurveyPayload = {
        title: surveyTitle,
        description: surveyDescription,
        questions: questionsData
    };

    console.log("Sending this JSON to Flask backend:", fullSurveyPayload);

  //Flask API niggas part
    fetch('http://127.0.0.1:5000/api/create-survey', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(fullSurveyPayload)
    })
    .then(response => response.json())
    .then(data => {
        alert("Survey successfully created and sent to backend!");
        console.log("Backend response:", data);
    })
    .catch(error => {
        console.error("Error sending survey:", error);
        alert("Could not reach backend, but JSON structure is generated in console!");
    });
}
    </script>
</body>
</html>
