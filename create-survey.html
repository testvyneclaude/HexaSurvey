    <h1 class="headline" style="text-align: center; margin-top: 20px;">Create Your Survey in Minutes</h1>

    <section class="create">
        <label>Survey Title</label><br><br>
        <input type="text" id="surveyTitle" placeholder="e.g Customer Satisfaction Survey"><br><br>
        <label>Description (optional)</label><br><br>
        <input type="text" id="surveyDescription" placeholder="What is this survey about?">

        <div id="formStatus" style="margin-top:15px; color:#f87171;"></div>

        <h3>Questions</h3><br>
        <div id="questionsContainer"></div>
        <button onclick="addQuestion('text')">+ Add Text Question</button>
        <button onclick="addQuestion('paragraph')">+ Add Paragraph Question</button>
        <button onclick="addQuestion('mcq')">+ Add Multiple Choice Question</button>
        
        <button onclick="submitSurvey()"  class="sub-btn"   style="border:1px solid white;background-color: rgb(57, 52, 52); color: white; margin-top: 30px; padding: 12px 25px; font-size: 18px; width: 100%; cursor: pointer;">
    Submit & Create Survey
</button>
    </section>


    <script>
       
const API_BASE = 'http://127.0.0.1:5000/api';
const urlParams = new URLSearchParams(window.location.search);
let surveyId = urlParams.get('id') ? parseInt(urlParams.get('id'), 10) : null;

let questionCounter = 0;
const formStatus = document.getElementById('formStatus');
const titleInput = document.getElementById('surveyTitle');
const descriptionInput = document.getElementById('surveyDescription');

function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str == null ? '' : String(str);
    return div.innerHTML;
}

function setStatus(msg, isError = true){
    formStatus.textContent = msg;
    formStatus.style.color = isError ? '#f87171' : '#5eead4';
}

function addQuestion(type, existing) {
    questionCounter++;
    const qId = "question_" + questionCounter;

    const div = document.createElement("div");
    div.className = "question-box";
    div.id = qId;
    div.dataset.type = type;

    const questionText = existing ? existing.question : "";
    const isRequired = existing ? !!existing.required : true;

    let inputHtml = "";

    if (type === 'text') {
        inputHtml = `
            <input type="text" placeholder="Enter your short answer question here" value="${escapeHtml(questionText)}"><br><br>
        `;
    }
    else if (type === 'paragraph') {
        inputHtml = `
            <input type="text" placeholder="Enter your paragraph question here" value="${escapeHtml(questionText)}"><br><br>
        `;
    }
    else if (type === 'mcq') {
        const existingOptions = (existing && existing.options && existing.options.length) ? existing.options : ["", ""];
        const optionsHtml = existingOptions.map((opt, i) => `
            <div style="margin-top: 5px;">
                <input type="radio" name="radio_${qId}" disabled>
                <input type="text" placeholder="Option ${i + 1}" value="${escapeHtml(opt)}" style="width: 75%; display: inline-block; padding: 8px;">
            </div>
        `).join('');

        inputHtml = `
            <input type="text" placeholder="Enter your MCQ question here" value="${escapeHtml(questionText)}" style="margin-bottom: 15px;"><br>
            
            <div id="options-container-${qId}" class="mcq-options" style="margin-left: 20px;">
                ${optionsHtml}
            </div>
            
            <button type="button" onclick="addOption('${qId}')" style="margin: 10px 0 20px 20px; background-color: #555; color: white; padding: 6px 12px; font-size: 14px;">+ Add Option</button>
            <br>
        `;
    }

    const typeLabel = type === 'mcq' ? 'MULTIPLE CHOICE' : type.toUpperCase();

    div.innerHTML = `
        <label>Question ${questionCounter} (${typeLabel})</label><br>
        ${inputHtml}
        <label style="font-size:14px;">
            <input type="checkbox" class="required-checkbox" ${isRequired ? 'checked' : ''} style="width:auto; display:inline-block; margin-right:6px;">
            Required
        </label>
        <br>
        <button onclick="removeQuestion('${qId}')">Remove Question</button>
        <hr style="margin:20px 0;">
    `;

    document.getElementById("questionsContainer").appendChild(div);
}

function addOption(questionId, existingValue) {
    const container = document.getElementById(`options-container-${questionId}`);
    const currentOptionsCount = container.children.length + 1;

    const optionDiv = document.createElement("div");
    optionDiv.style.marginTop = "5px";
    optionDiv.innerHTML = `
        <input type="radio" name="radio_${questionId}" disabled> 
        <input type="text" placeholder="Option ${currentOptionsCount}" value="${escapeHtml(existingValue || '')}" style="width: 75%; display: inline-block; padding: 8px;">
        <button type="button" onclick="this.parentElement.remove()" style="background: transparent; color: red; border: none; cursor: pointer; margin-left: 5px;">✕</button>
    `;

    container.appendChild(optionDiv);
}

function removeQuestion(elementId) {
    const element = document.getElementById(elementId);
    if (element) {
        element.remove();
    }
}

function collectQuestionsPayload(){
    const questionsData = [];
    const questionElements = document.querySelectorAll('.question-box');

    questionElements.forEach((box) => {
        const type = box.dataset.type; // 'text' | 'paragraph' | 'mcq'
        const questionTypeMap = { text: 'short_answer', paragraph: 'paragraph', mcq: 'multiple_choice' };
        const questionTextInput = box.querySelector('input[type="text"]');
        const questionText = questionTextInput ? questionTextInput.value.trim() : "";
        const required = box.querySelector('.required-checkbox').checked;

        const questionItem = {
            question: questionText,
            question_type: questionTypeMap[type],
            required: required
        };

        if (type === 'mcq') {
            const options = [];
            const optionInputs = box.querySelectorAll(`#options-container-${box.id} input[type="text"]`);
            optionInputs.forEach(optInput => {
                if (optInput.value.trim() !== "") {
                    options.push(optInput.value.trim());
                }
            });
            questionItem.options = options;
        }

        questionsData.push(questionItem);
    });

    return questionsData;
}

async function loadExistingSurvey(id){
    setStatus('Loading survey…', false);
    try {
        const response = await fetch(`${API_BASE}/surveys/${id}`, {
            method: 'GET',
            credentials: 'include'
        });

        if (response.status === 401){
            window.location.href = 'auth.html';
            return;
        }

        const data = await response.json();

        if (!response.ok || !data.success){
            setStatus(data.message || 'Could not load this survey.');
            return;
        }

        const survey = data.data;
        titleInput.value = survey.title || '';
        descriptionInput.value = survey.description || '';

        const typeReverseMap = { short_answer: 'text', paragraph: 'paragraph', multiple_choice: 'mcq' };
        (survey.questions || []).forEach(q => {
            addQuestion(typeReverseMap[q.question_type] || 'text', q);
        });

        setStatus('', false);

    } catch (err) {
        console.error('Failed to load survey:', err);
        setStatus('Could not reach the server. Is the Flask backend running on http://127.0.0.1:5000?');
    }
}

async function submitSurvey() {
    setStatus('', false);

    const surveyTitle = titleInput.value.trim();
    const surveyDescription = descriptionInput.value.trim();

    if (!surveyTitle) {
        setStatus("Please enter a survey title!");
        return;
    }

    const questionsData = collectQuestionsPayload();

    try {
        // All this part just mean say if na brand new survey e suppose create the draft first to get an id.
        if (!surveyId) {
            const createResponse = await fetch(`${API_BASE}/surveys`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ title: surveyTitle, description: surveyDescription })
            });

            if (createResponse.status === 401){
                window.location.href = 'auth.html';
                return;
            }

            const createData = await createResponse.json();
            if (!createResponse.ok || !createData.success) {
                setStatus(createData.message || 'Could not create the survey.');
                return;
            }
            surveyId = createData.data.id;
        }

        // This part now handles both draft and publish...saves title, description, questions, and options together
        const publishResponse = await fetch(`${API_BASE}/surveys/${surveyId}/publish`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({
                title: surveyTitle,
                description: surveyDescription,
                questions: questionsData
            })
        });

        const publishData = await publishResponse.json();

        if (!publishResponse.ok || !publishData.success) {
            setStatus(publishData.message || 'Could not publish the survey.');
            return;
        }

        alert(`Survey published! Share token: ${publishData.data.share_token}`);
        window.location.href = 'dashboard.html';

    } catch (error) {
        console.error("Error saving survey:", error);
        setStatus('Could not reach the server. Is the Flask backend running on http://127.0.0.1:5000?');
    }
}

if (surveyId) {
    loadExistingSurvey(surveyId);
}
    </script>
