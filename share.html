<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HexaSurvey — Survey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="surv-land.css">
<style>
    *{ box-sizing: border-box; }
    body{ margin-top: 80px; padding: 30px; }
    .survey-wrap{ max-width: 720px; margin: 40px auto; }
    .inner-card{
        background-color: var(--bg-elevated);
        padding: 30px;
        border-radius: 18px;
        margin-top: 24px;
        border: 0.5px solid var(--border);
    }
    .question-card{
        background-color: var(--bg-card);
        padding: 22px;
        border-radius: 14px;
        margin-bottom: 18px;
        border: 0.5px solid var(--border);
    }
    .question-card label.q-label{
        font-family: var(--font-display);
        font-size: 1.05rem;
        display: block;
        margin-bottom: 14px;
    }
    .required-star{ color: var(--pink-glow); margin-left: 4px; }
    .question-card input[type="text"],
    .question-card textarea{
        width: 100%;
        background: transparent;
        border: none;
        border-top: 0.5px solid var(--border);
        border-bottom: 0.5px solid var(--muted);
        border-radius: 12px;
        padding: 14px;
        color: var(--white);
        font-family: var(--font-body);
        font-size: 15px;
    }
    .question-card textarea{ min-height: 100px; resize: vertical; }
    .option-row{ display: flex; align-items: center; gap: 10px; margin-top: 10px; }
    .option-row input[type="radio"]{ width: auto; accent-color: var(--purple-500); }
    #statusMsg{ margin-top: 18px; }
    .state-msg{ color: var(--muted); text-align: center; padding: 40px 0; }
</style>
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <div class="logo">Hexa<span class="x">Survey</span></div>
    <a href="index.html" class="sign-in nav-cta">Home</a>
  </div>
</header>

<div class="survey-wrap">
    <div id="loadingState" class="state-msg">Loading survey…</div>

    <div id="surveyContent" style="display:none;">
        <h1 id="surveyTitle" class="headline" style="font-size: 2.2rem;"></h1>
        <p id="surveyDescription" style="color: var(--muted); margin-top: 10px;"></p>

        <div class="inner-card">
            <form id="responseForm">
                <div id="questionsContainer"></div>
                <div id="statusMsg" style="color:#f87171;"></div>
                <button type="submit" class="btn btn-primary" id="submitBtn" style="width:100%; margin-top:10px;">Submit response</button>
            </form>
        </div>
    </div>
</div>

<script>
    const API_BASE = 'http://127.0.0.1:5000/api';
    const params = new URLSearchParams(window.location.search);
    const shareToken = params.get('token');

    const loadingState = document.getElementById('loadingState');
    const surveyContent = document.getElementById('surveyContent');
    const surveyTitleEl = document.getElementById('surveyTitle');
    const surveyDescriptionEl = document.getElementById('surveyDescription');
    const questionsContainer = document.getElementById('questionsContainer');
    const statusMsg = document.getElementById('statusMsg');
    const submitBtn = document.getElementById('submitBtn');
    const form = document.getElementById('responseForm');

    function escapeHtml(str){
        const div = document.createElement('div');
        div.textContent = str == null ? '' : String(str);
        return div.innerHTML;
    }

    function showState(msg){
        loadingState.textContent = msg;
        loadingState.style.display = 'block';
        surveyContent.style.display = 'none';
    }

    function renderQuestion(q){
        const wrapper = document.createElement('div');
        wrapper.className = 'question-card';
        wrapper.dataset.questionId = q.id;
        wrapper.dataset.type = q.question_type;

        const requiredMark = q.required ? '<span class="required-star">*</span>' : '';
        let fieldHtml = '';

        if (q.question_type === 'short_answer'){
            fieldHtml = `<input type="text" name="q_${q.id}">`;
        } else if (q.question_type === 'paragraph'){
            fieldHtml = `<textarea name="q_${q.id}"></textarea>`;
        } else if (q.question_type === 'multiple_choice'){
            fieldHtml = (q.options || []).map((opt, i) => `
                <div class="option-row">
                    <input type="radio" id="q_${q.id}_opt_${i}" name="q_${q.id}" value="${escapeHtml(opt)}">
                    <label for="q_${q.id}_opt_${i}">${escapeHtml(opt)}</label>
                </div>
            `).join('');
        }

        wrapper.innerHTML = `
            <label class="q-label">${escapeHtml(q.question)}${requiredMark}</label>
            ${fieldHtml}
        `;

        questionsContainer.appendChild(wrapper);
    }

    async function loadSurvey(){
        if (!shareToken){
            showState('No survey link provided.');
            return;
        }

        try {
            const response = await fetch(`${API_BASE}/surveys/share/${shareToken}`, {
                method: 'GET',
                credentials: 'include'
            });

            if (response.status === 401){
                window.location.href = `auth.html?redirect=${encodeURIComponent(window.location.pathname + window.location.search)}`;
                return;
            }
            if (response.status === 403){
                showState('This survey is only open to respondents.');
                return;
            }
            if (response.status === 404){
                showState('This survey link is invalid or no longer available.');
                return;
            }

            const data = await response.json();

            if (!response.ok || !data.success){
                showState(data.message || 'Could not load this survey.');
                return;
            }

            const survey = data.data;
            surveyTitleEl.textContent = survey.title;
            surveyDescriptionEl.textContent = survey.description || '';
            (survey.questions || []).forEach(renderQuestion);

            loadingState.style.display = 'none';
            surveyContent.style.display = 'block';

        } catch (err){
            console.error('Failed to load survey:', err);
            showState('Could not reach the server. Is the Flask backend running on http://127.0.0.1:5000?');
        }
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        statusMsg.textContent = '';

        const questionCards = document.querySelectorAll('.question-card');
        const answers = [];
        let missingRequired = false;

        questionCards.forEach(card => {
            const qId = card.dataset.questionId;
            const type = card.dataset.type;
            let answerValue = '';

            if (type === 'multiple_choice'){
                const checked = card.querySelector(`input[name="q_${qId}"]:checked`);
                answerValue = checked ? checked.value : '';
            } else {
                const field = card.querySelector(`[name="q_${qId}"]`);
                answerValue = field ? field.value.trim() : '';
            }

            const label = card.querySelector('.q-label');
            const isRequired = label.querySelector('.required-star') !== null;
            if (isRequired && !answerValue){
                missingRequired = true;
            }

            if (answerValue){
                answers.push({ question_id: parseInt(qId, 10), answer: answerValue });
            }
        });

        if (missingRequired){
            statusMsg.textContent = 'Please answer all required questions.';
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting…';

        try {
            const response = await fetch(`${API_BASE}/surveys/share/${shareToken}/submit`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ answers })
            });

            if (response.status === 401){
                window.location.href = `auth.html?redirect=${encodeURIComponent(window.location.pathname + window.location.search)}`;
                return;
            }

            const data = await response.json();

            if (response.status === 409){
                statusMsg.style.color = '#f87171';
                statusMsg.textContent = data.message || 'You have already submitted a response to this survey.';
                submitBtn.disabled = true;
                submitBtn.textContent = 'Already submitted';
                return;
            }

            if (!response.ok || !data.success){
                statusMsg.style.color = '#f87171';
                statusMsg.textContent = data.message || 'Could not submit your response.';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit response';
                return;
            }

            surveyContent.innerHTML = `<div class="state-msg" style="color: var(--purple-300);">Thanks — your response has been submitted.</div>`;

        } catch (err){
            console.error('Submit failed:', err);
            statusMsg.style.color = '#f87171';
            statusMsg.textContent = 'Could not reach the server. Is the Flask backend running on http://127.0.0.1:5000?';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Submit response';
        }
    });

    loadSurvey();
</script>

</body>
</html>
